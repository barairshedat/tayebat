<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0f1a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>نظام الطيبات</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f1a0f;--card:#162116;--card-inner:#1e2e1e;--border:#2a3d2a;--green-dark:#1a4a1a;--green-light:#4ade80;--gold:#d4a017;--text:#e8edd8;--text-muted:#7a9470;--font-display:'Amiri',serif;--font-body:'Cairo',sans-serif;}
.light-mode{--bg:#f5f0e8;--card:#ffffff;--card-inner:#f0ece0;--border:#ddd5c0;--green-dark:#2d6a2d;--green-light:#16a34a;--gold:#b8860b;--text:#1a1a1a;--text-muted:#6b6b5a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);direction:rtl;-webkit-tap-highlight-color:transparent;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
input::placeholder{color:var(--text-muted);font-family:var(--font-body);}
input:focus{border-color:var(--gold)!important;outline:none;}
button{font-family:var(--font-body);cursor:pointer;}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
#topbar{background:var(--green-dark);padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
#topbar .title{font-family:var(--font-display);color:var(--gold);font-size:1.1rem;}
#topbar .sub{color:var(--text-muted);font-size:.75rem;}
#content{flex:1;overflow-y:auto;padding:0 1rem;padding-bottom:5.5rem;}
#bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:.5rem 0 .75rem;z-index:20;}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:.2rem;background:none;border:none;padding:.25rem .35rem;min-width:42px;}
.navbtn .emoji{font-size:1.25rem;filter:grayscale(50%) opacity(.6);}
.navbtn.active .emoji{filter:none;}
.navbtn .lbl{font-size:.58rem;color:var(--text-muted);font-family:var(--font-body);}
.navbtn.active .lbl{color:var(--gold);font-weight:700;}
.navdot{width:4px;height:4px;border-radius:50%;background:var(--gold);display:none;}
.navbtn.active .navdot{display:block;}
.page{display:none;animation:fadeIn .25s ease;}
.page.active{display:block;}
/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin-bottom:.75rem;}
.section-header{text-align:center;margin-bottom:1.5rem;padding-top:1rem;}
.section-header .ico{font-size:2.5rem;}
.section-header h2{font-family:var(--font-display);color:var(--gold);font-size:1.4rem;margin:.4rem 0 .25rem;}
.section-header p{color:var(--text-muted);font-size:.85rem;}
/* accordion */
.acc-btn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;display:flex;justify-content:space-between;align-items:center;color:var(--text);font-size:1rem;font-weight:600;transition:all .2s;margin-bottom:.4px;}
.acc-btn.open{border-radius:12px 12px 0 0;}
.acc-body{display:none;background:var(--card-inner);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:.75rem .5rem;animation:fadeIn .2s ease;margin-bottom:.75rem;}
.acc-body.open{display:block;}
.acc-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem .75rem;border-radius:8px;margin-bottom:.2rem;}
.badge{border-radius:20px;padding:.15rem .65rem;font-size:.75rem;color:#fff;white-space:nowrap;}
/* chips */
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:.3rem .75rem;color:var(--text-muted);font-size:.8rem;margin:.25rem;}
/* mode toggle */
.mode-toggle{display:flex;background:var(--card);border-radius:14px;padding:4px;border:1px solid var(--border);margin-bottom:1.25rem;}
.mode-btn{flex:1;padding:.6rem;border-radius:10px;border:none;background:transparent;color:var(--text-muted);font-size:.9rem;transition:all .2s;}
.mode-btn.active{background:var(--green-dark);color:var(--gold);font-weight:700;}
/* dropzone */
.dropzone{border:2px dashed var(--border);border-radius:16px;padding:2rem 1rem;text-align:center;cursor:pointer;background:var(--card);margin-bottom:.75rem;transition:border-color .2s;}
.dropzone:hover,.dropzone.drag{border-color:var(--gold);}
/* result box */
.result-box{border-radius:16px;padding:1.25rem 1.5rem;line-height:1.8;font-size:1rem;text-align:right;white-space:pre-wrap;animation:fadeIn .3s ease;margin-top:1rem;}
.result-box.ok{background:rgba(22,163,74,.12);border:2px solid #16a34a;}
.result-box.no{background:rgba(220,38,38,.12);border:2px solid #dc2626;}
.result-box.warn{background:rgba(202,138,4,.1);border:2px solid #ca8a04;}
/* weekly */
.week-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin-bottom:.75rem;}
.week-card.fast{background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.3);}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.6rem;}
.meal-cell{background:var(--card-inner);border-radius:8px;padding:.5rem .75rem;text-align:right;}
.meal-lbl{color:var(--text-muted);font-size:.73rem;margin-bottom:.2rem;}
.meal-val{color:var(--text);font-size:.84rem;line-height:1.4;}
/* alt table */
.alt-table{border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.alt-head{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--green-dark);padding:.75rem 1rem;gap:.5rem;}
.alt-head span{color:var(--gold);font-weight:700;font-size:.82rem;text-align:center;}
.alt-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:.75rem 1rem;gap:.5rem;border-top:1px solid var(--border);}
.alt-row:nth-child(odd){background:var(--card);}
.alt-row:nth-child(even){background:var(--card-inner);}
.alt-row span{font-size:.8rem;text-align:center;}
/* img preview */
#img-preview-wrap{position:relative;margin-bottom:.85rem;}
#img-preview{width:100%;border-radius:14px;max-height:260px;object-fit:contain;background:var(--card-inner);border:1px solid var(--border);display:block;}
#img-clear{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;}
#img-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);border-radius:8px;padding:.25rem .6rem;color:#fff;font-size:.75rem;}
/* tabs */
.recipe-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;justify-content:flex-end;}
.recipe-tab{padding:.4rem 1rem;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-size:.82rem;transition:all .2s;}
.recipe-tab.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
/* New detailed recipe cards */
.rcard{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:.85rem;overflow:hidden;transition:box-shadow .2s;}
.rcard-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.1rem;cursor:pointer;gap:.75rem;}
.rcard-header:active{opacity:.85;}
.rcard-emoji{font-size:2rem;flex-shrink:0;}
.rcard-info{flex:1;text-align:right;}
.rcard-name{color:var(--gold);font-weight:700;font-size:1rem;margin-bottom:.2rem;}
.rcard-tagline{color:var(--text-muted);font-size:.78rem;line-height:1.4;}
.rcard-meta{display:flex;gap:.5rem;margin-top:.4rem;justify-content:flex-end;}
.rcard-badge{background:var(--card-inner);border:1px solid var(--border);border-radius:20px;padding:.15rem .6rem;font-size:.72rem;color:var(--text-muted);}
.rcard-chevron{color:var(--text-muted);font-size:.9rem;flex-shrink:0;transition:transform .25s;}
.rcard-chevron.open{transform:rotate(180deg);}
.rcard-body{display:none;border-top:1px solid var(--border);animation:fadeIn .2s ease;}
.rcard-body.open{display:block;}
.rcard-section{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);}
.rcard-section:last-child{border-bottom:none;}
.rcard-section-title{color:var(--gold);font-size:.8rem;font-weight:700;margin-bottom:.65rem;text-align:right;display:flex;align-items:center;gap:.4rem;justify-content:flex-end;}
.rcard-ing-row{display:flex;justify-content:space-between;align-items:baseline;padding:.4rem 0;border-bottom:1px dashed var(--border);}
.rcard-ing-row:last-child{border-bottom:none;}
.rcard-ing-name{color:var(--text);font-size:.85rem;text-align:right;}
.rcard-ing-amount{color:var(--gold);font-size:.82rem;white-space:nowrap;margin-right:.5rem;font-weight:600;}
.rcard-step{display:flex;gap:.75rem;align-items:flex-start;padding:.55rem 0;border-bottom:1px dashed var(--border);}
.rcard-step:last-child{border-bottom:none;}
.rcard-step-num{background:var(--green-dark);color:var(--gold);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:2px;}
.rcard-step-text{color:var(--text);font-size:.85rem;line-height:1.55;text-align:right;flex:1;}
.rcard-why{background:var(--card-inner);}
.rcard-why-item{padding:.65rem .9rem;border-bottom:1px solid var(--border);}
.rcard-why-item:last-child{border-bottom:none;}
.rcard-why-q{color:var(--gold);font-size:.8rem;font-weight:600;margin-bottom:.3rem;text-align:right;}
.rcard-why-a{color:var(--text-muted);font-size:.8rem;line-height:1.55;text-align:right;}
.drink-allowed{border-color:rgba(34,197,94,.2);}
.drink-forbidden{border-color:rgba(239,68,68,.2);}
/* home */
.home-card{background:var(--card);border:1px solid var(--gold);border-radius:16px;padding:1.25rem;margin-bottom:1.5rem;text-align:center;}
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;display:flex;justify-content:flex-end;align-items:center;gap:.75rem;margin-bottom:.6rem;}
.rule-num{background:var(--green-dark);color:var(--gold);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem;}
.nav-card{border-radius:14px;padding:1.1rem .75rem;display:flex;flex-direction:column;align-items:center;gap:.4rem;border:1px solid;}
.quote-card{background:var(--card);border-right:4px solid var(--gold);border-radius:8px;padding:1rem 1.25rem;text-align:right;}
.loading-anim{text-align:center;padding:1.5rem;animation:fadeIn .3s ease;}
.spinner{font-size:2rem;display:inline-block;animation:spin 1s linear infinite;}
</style>
</head>

const NAV=[
  {key:"home",label:"رئيسية",emoji:"🏠"},
  {key:"inspect",label:"فحص",emoji:"📷"},
  {key:"allowed",label:"مسموح",emoji:"✅"},
  {key:"forbidden",label:"ممنوع",emoji:"❌"},
  {key:"drinks",label:"مشروبات",emoji:"🥤"},
  {key:"alt",label:"بدائل",emoji:"🔄"},
  {key:"recipes",label:"وصفات",emoji:"🍽️"},
];

let currentTab="home";

function buildNav(){
  const nav=document.getElementById("bottomnav");
  nav.innerHTML=NAV.map(n=>`
    <button class="navbtn${n.key===currentTab?" active":""}" onclick="goTab('${n.key}')">
      <span class="emoji">${n.emoji}</span>
      <span class="lbl">${n.label}</span>
      <span class="navdot"></span>
    </button>`).join("");
}

function goTab(key){
  currentTab=key;
  buildNav();
  renderPage(key);
  document.getElementById("content").scrollTop=0;
}

// ── Pages ──────────────────────────────────────────────────────────────────────
function renderPage(key){
  const c=document.getElementById("content");
  switch(key){
    case"home":    c.innerHTML=pageHome(); break;
    case"inspect": c.innerHTML=pageInspect(); bindInspect(); break;
    case"allowed": c.innerHTML=pageAllowed(); bindAcc(); break;
    case"forbidden":c.innerHTML=pageForbidden(); bindAcc(); break;
    case"drinks":  c.innerHTML=pageDrinks(); break;
    case"alt":     c.innerHTML=pageAlt(); break;
    case"recipes": c.innerHTML=pageRecipes(); bindRecipes(); break;
  }
}

function bindInspect(){

function updateImgCounter(){
  const el=document.getElementById("img-counter");
  if(el) el.textContent=`${inspectImages.length} / 5 صور`;
}

function renderImgPreviews(){
  const wrap=document.getElementById("imgs-preview-wrap");
  if(!wrap) return;
  if(inspectImages.length===0){ wrap.style.display="none"; return; }
  wrap.style.display="flex";
  const labels=["١","٢","٣","٤","٥"];
  wrap.innerHTML=inspectImages.map((img,i)=>`
    <div style="position:relative;width:calc(20% - .4rem);flex-shrink:0;min-width:60px">
      <img src="${img.preview}" style="width:100%;height:75px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);display:block"/>
      <button onclick="removeImage(${i})" style="position:absolute;top:3px;left:3px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">✕</button>
      <div style="position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.6);border-radius:4px;padding:.1rem .3rem">
        <span style="color:#4ade80;font-size:.6rem">${labels[i]}</span>
      </div>
    </div>`).join("")+
    (inspectImages.length<5?`
    <div onclick="document.getElementById('camera-input').click()" style="width:calc(20% - .4rem);min-width:60px;height:75px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;flex-direction:column;gap:.2rem">
      <span style="font-size:1.1rem">📷</span>
      <span style="color:var(--text-muted);font-size:.6rem">صوّر</span>
    </div>`:"");
  updateImgCounter();
}

function handleCameraPick(e){
  const file=e.target.files[0];
  e.target.value="";
  if(!file) return;
  if(inspectImages.length>=5){ alert("الحد الأقصى ٥ صور"); return; }
  loadImageFile(file);
}

function removeImage(i){
  inspectImages.splice(i,1);
  renderImgPreviews();
  if(inspectImages.length===0){
    const wrap=document.getElementById("imgs-preview-wrap");
    if(wrap) wrap.style.display="none";
  }
  updateImgCounter();
}

function clearImage(){
  inspectImages=[];
  const wrap=document.getElementById("imgs-preview-wrap");
  if(wrap){ wrap.style.display="none"; wrap.innerHTML=""; }
  document.getElementById("inspect-result").innerHTML="";
  updateImgCounter();
}

function quickCheck(q){
  const el=document.getElementById("txt-input");
  if(el){ el.value=q; doCheck(); }
}

function switchMode(m){}

function loadImageFile(file){
  if(!file||!file.type.startsWith("image/"))return;
  if(inspectImages.length>=5){ alert("الحد الأقصى ٥ صور"); return; }
  const reader=new FileReader();
  reader.onload=ev=>{
    inspectImages.push({base64:ev.target.result.split(",")[1], mediaType:file.type, preview:ev.target.result});
    document.getElementById("inspect-result").innerHTML="";
    renderImgPreviews();
  };
  reader.readAsDataURL(file);
}

function handleFilePick(e){
  const files=Array.from(e.target.files);
  e.target.value="";
  const remaining=5-inspectImages.length;
  if(remaining<=0){ alert("الحد الأقصى ٥ صور"); return; }
  files.slice(0,remaining).forEach(f=>loadImageFile(f));
}

const SYSTEM_PROMPT=`أنت مساعد متخصص في نظام الطيبات بناءً على كلام الدكتور ضياء العوضي رحمه الله.

ثم اذكر تقييم النسبة هكذا بالضبط في سطر مستقل:
SCORE:XX (رقم من 0 إلى 100 يمثل نسبة التوافق مع النظام)

ثم اذكر إذا كان يحتوي على أي من هذه بالضبط في سطر مستقل:
BLOCKED:YES إذا فيه بيض أو حليب طازج أو ألبان أو دجاج أو دقيق أبيض أو مخبوزات
BLOCKED:NO إذا لا يحتوي على أي منها

ثم الشرح بالعربية (٣-٦ جمل).`;

async function doCheck(){
  const txt=(document.getElementById("txt-input")?.value||"").trim();
  if(!txt && inspectImages.length===0) return;

  lastCheckResult=null;
  document.getElementById("inspect-loading").style.display="block";
  document.getElementById("inspect-result").innerHTML="";
  document.getElementById("loading-msg").textContent=LOADING_MSGS[0];

  let mi=0;
  loadingInterval=setInterval(()=>{
    mi=(mi+1)%LOADING_MSGS.length;
    const el=document.getElementById("loading-msg");
    if(el) el.textContent=LOADING_MSGS[mi];
  },1200);

  try{
    let userContent;
    if(inspectImages.length>0){
      userContent=[
        ...inspectImages.map(img=>({type:"image",source:{type:"base64",media_type:img.mediaType,data:img.base64}})),
        {type:"text",text:txt?`${txt}\n\nافحص هذه الصور للمنتج وحكم عليه بناءً على نظام الطيبات.`:`افحص هذه الصور للمنتج (${inspectImages.length} صور) وحكم عليه بناءً على نظام الطيبات. ركّز على قائمة المكونات.`},
      ];
    } else {
      userContent=txt;
    }
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:"user",content:userContent}]}),
    });
    const data=await res.json();
    const raw=data.content?.map(c=>c.text||"").join("")||"حدث خطأ";
    clearInterval(loadingInterval);
    document.getElementById("inspect-loading").style.display="none";

    // Parse score and blocked
    const scoreMatch=raw.match(/SCORE:(\d+)/);
    const blockedMatch=raw.match(/BLOCKED:(YES|NO)/);
    const score=scoreMatch?parseInt(scoreMatch[1]):0;
    const blocked=blockedMatch?blockedMatch[1]==="YES":true;
    // Clean text — remove meta lines
    const cleanText=raw.replace(/SCORE:\d+\n?/g,"").replace(/BLOCKED:(YES|NO)\n?/g,"").trim();

    const isOk=cleanText.startsWith("✅");
    const isNo=cleanText.startsWith("❌");
    const canAdd=isOk && score>=80 && !blocked;

    lastCheckResult={cleanText, canAdd, score, productName: txt||(inspectImages.length>0?"منتج مصوَّر":"")};

    document.getElementById("inspect-result").innerHTML=`
      <div class="result-box ${isOk?"ok":isNo?"no":"warn"}" style="animation:fadeIn .3s ease">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
          <div style="display:flex;align-items:center;gap:.4rem">
            <div style="background:var(--card-inner);border-radius:20px;padding:.2rem .6rem;display:flex;align-items:center;gap:.3rem">
              <div style="width:${score}%;height:4px;background:${score>=80?"#16a34a":score>=50?"#ca8a04":"#ef4444"};border-radius:2px;min-width:4px;max-width:60px"></div>
              <span style="font-size:.7rem;color:var(--text-muted)">${score}%</span>
            </div>
          </div>
          <span style="font-size:1.3rem">${isOk?"✅":isNo?"❌":"⚠️"}</span>
        </div>
        ${cleanText.replace(/\n/g,"<br>")}
        ${canAdd?`
        <div style="margin-top:1rem;padding-top:.85rem;border-top:1px dashed rgba(255,255,255,.1)">
          <p style="color:var(--green-light);font-size:.78rem;margin-bottom:.6rem;text-align:right">✅ هذا المنتج مؤهل للإضافة للبدائل</p>
          <div style="display:flex;gap:.5rem">
            <button onclick="showAddAltForm()" style="flex:1;background:var(--green-dark);color:var(--gold);border:none;border-radius:10px;padding:.6rem;font-size:.85rem;font-weight:700;cursor:pointer">
              ➕ أضفه للبدائل
            </button>
          </div>
        </div>`:`${isOk && (score<80||blocked)?`
        <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px dashed rgba(255,255,255,.1)">
          <p style="color:#ca8a04;font-size:.75rem;text-align:right">⚠️ ${score<80?`نسبة التوافق ${score}% — أقل من 80% المطلوبة للإضافة`:""} ${blocked?"• يحتوي على مكون ممنوع أساسي":""}</p>
        </div>`:""}
        `}
      </div>
      <div id="add-alt-form" style="display:none"></div>`;
  }catch(err){
    clearInterval(loadingInterval);
    document.getElementById("inspect-loading").style.display="none";
    document.getElementById("inspect-result").innerHTML=`<div class="result-box warn">حدث خطأ في الاتصال. تأكد من الإنترنت وحاول مجدداً.</div>`;
  }
}

// ── Alternatives ───────────────────────────────────────────────────────────────
function pageAlt(){
  const linkBtn=(url,label,color)=>url
    ?`<a href="${url}" target="_blank" style="display:inline-flex;align-items:center;gap:.25rem;background:${color};color:#fff;border-radius:8px;padding:.22rem .55rem;font-size:.68rem;font-weight:600;text-decoration:none;white-space:nowrap">${label}</a>`
    :`<span style="font-size:.68rem;color:var(--text-muted)">محلات عربية</span>`;

  const customSection=customAlts.length>0?`
    <div style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:.5rem;margin-bottom:.75rem">
        <h3 style="color:var(--gold);font-family:var(--font-display);font-size:1rem;margin:0">بدائل أضفتها أنت 📸</h3>
      </div>
      ${customAlts.map((r,i)=>`
        <div style="background:var(--card);border:1px solid rgba(22,163,74,.25);border-radius:14px;padding:.85rem 1rem;margin-bottom:.6rem">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
            <div style="display:flex;gap:.4rem;flex-wrap:wrap;flex-shrink:0;align-items:center">
              <button onclick="deleteCustomAlt(${i})"
                style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:.22rem .55rem;color:#ef4444;font-size:.68rem;cursor:pointer">🗑</button>
              <span style="background:rgba(22,163,74,.15);color:var(--green-light);border-radius:8px;padding:.22rem .55rem;font-size:.68rem;font-weight:600">${r.score}% ✓</span>
            </div>
            <div style="text-align:right;min-width:0">
              <div style="color:var(--green-light);font-weight:600;font-size:.9rem;margin-bottom:.2rem">✅ ${r.name}</div>
              <div style="color:var(--text-muted);font-size:.75rem">${r.store}${r.replaces?` · بديل عن: ${r.replaces}`:""}</div>
              <div style="color:var(--text-muted);font-size:.68rem;margin-top:.2rem">أضفته ${r.date}</div>
            </div>
          </div>
        </div>`).join("")}
    </div>`:"";

  return`
  <div style="padding-bottom:2rem">
    <div class="section-header"><div class="ico">🔄</div><h2>البدائل</h2><p>اضغط على الأيقونة للشراء المباشر</p></div>

    ${customSection}

    <div style="display:flex;align-items:center;justify-content:flex-end;gap:.5rem;margin-bottom:.75rem">
      <h3 style="color:var(--text-muted);font-size:.85rem;margin:0">البدائل الأساسية</h3>
    </div>
    ${ALTERNATIVES.map(r=>`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.85rem 1rem;margin-bottom:.6rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;flex-shrink:0;align-items:center">
            ${r.wm ? linkBtn(r.wm,"🛒 Walmart","#0071ce") : ""}
            ${r.jo ? linkBtn(r.jo,"🛍 Jewel","#e31837") : ""}
            ${!r.wm && !r.jo ? `<span style="font-size:.72rem;color:var(--text-muted)">محلات عربية</span>` : ""}
          </div>
          <div style="text-align:right;min-width:0">
            <div style="color:var(--green-light);font-weight:600;font-size:.9rem;margin-bottom:.2rem">✅ ${r.a}</div>
            <div style="font-size:.78rem;color:${r.better?"#ca8a04":"#ef4444"}">
              ${r.better ? `⭐ الأفضل من: ${r.f}` : `❌ بديلاً عن: ${r.f}`}
            </div>
          </div>
        </div>
      </div>`).join("")}
    <p style="color:var(--text-muted);font-size:.72rem;text-align:center;margin-top:.5rem">🔗 الروابط تفتح صفحة المنتج في المتصفح مباشرة</p>
  </div>`;
}

function deleteCustomAlt(i){
  customAlts.splice(i,1);
  saveCustomAlts();
  goTab("alt");
}

// ── Recipes ────────────────────────────────────────────────────────────────────
let recipeView="recipes";
let recipeType=null;

function pageRecipes(){
  const types=[...new Set(RECIPES.map(r=>r.type))];
  if(!recipeType)recipeType=types[0];
  return`
  <div style="padding-bottom:2rem">
    <div class="section-header"><div class="ico">🍽️</div><h2>الوصفات والخطة الأسبوعية</h2><p>وجبات شامية أردنية مفصّلة — اضغط على الوصفة لتفاصيلها</p></div>
    <div style="display:flex;gap:.5rem;justify-content:center;margin-bottom:1.25rem">
      <button class="mode-btn${recipeView==="recipes"?" active":""}" onclick="switchRecipeView('recipes')" style="border-radius:24px;border:none;padding:.6rem 1.5rem">الوصفات</button>
      <button class="mode-btn${recipeView==="weekly"?" active":""}" onclick="switchRecipeView('weekly')" style="border-radius:24px;border:none;padding:.6rem 1.5rem">الخطة الأسبوعية</button>
    </div>
    <div id="recipe-content">
      ${recipeView==="recipes"?renderRecipesTab(types):renderWeeklyTab()}
    </div>
  </div>`;
}

function renderRecipeCard(r){
  return`
  <div class="rcard" id="rcard-${r.id}">
    <div class="rcard-header" onclick="toggleRecipe('${r.id}')">
      <span class="rcard-chevron" id="chev-${r.id}">▼</span>
      <div class="rcard-info">
        <div class="rcard-name">${r.name}</div>
        <div class="rcard-tagline">${r.tagline}</div>
        <div class="rcard-meta">
          <span class="rcard-badge">⏱ ${r.time}</span>
          <span class="rcard-badge">👥 ${r.serves}</span>
          <span class="rcard-badge">${r.type}</span>
        </div>
      </div>
      <span class="rcard-emoji">${r.e}</span>
    </div>
    <div class="rcard-body" id="rbody-${r.id}">
      <!-- المقادير -->
      <div class="rcard-section">
        <div class="rcard-section-title">🧺 المقادير</div>
        ${r.ingredients.map(i=>`
          <div class="rcard-ing-row">
            <span class="rcard-ing-amount">${i.amount}</span>
            <span class="rcard-ing-name">${i.item}</span>
          </div>`).join("")}
      </div>
      <!-- طريقة التحضير -->
      <div class="rcard-section">
        <div class="rcard-section-title">👩‍🍳 طريقة التحضير</div>
        ${r.steps.map((s,i)=>`
          <div class="rcard-step">
            <div class="rcard-step-num">${i+1}</div>
            <div class="rcard-step-text">${s}</div>
          </div>`).join("")}
      </div>
      <!-- ليش هيك وليش لأ -->
      <div class="rcard-section rcard-why">
        <div class="rcard-section-title" style="padding:.9rem 1.1rem .0rem">🌿 فلسفة النظام</div>
        ${r.why.map(w=>`
          <div class="rcard-why-item">
            <div class="rcard-why-q">❓ ${w.q}</div>
            <div class="rcard-why-a">← ${w.a}</div>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function toggleRecipe(id){
  const body=document.getElementById("rbody-"+id);
  const chev=document.getElementById("chev-"+id);
  const open=body.classList.toggle("open");
  chev.classList.toggle("open",open);
  chev.textContent=open?"▲":"▼";
  if(open){
    setTimeout(()=>{
      document.getElementById("rcard-"+id).scrollIntoView({behavior:"smooth",block:"nearest"});
    },100);
  }
}

function renderRecipesTab(types){
  const filtered=RECIPES.filter(r=>r.type===recipeType);
  return`
    <div class="recipe-tabs">
      ${types.map(t=>`<button class="recipe-tab${t===recipeType?" active":""}" onclick="switchRecipeType('${t}')">${t}</button>`).join("")}
    </div>
    ${filtered.map(r=>renderRecipeCard(r)).join("")}`;
}

function renderWeeklyTab(){
  return WEEKLY.map(d=>`
    <div class="week-card${d.fast?" fast":""}">
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:.5rem;margin-bottom:.6rem">
        ${d.note?`<span style="color:${d.fast?"#a78bfa":"var(--gold)"};font-size:.8rem">${d.note}</span>`:""}
        <h3 style="margin:0;color:${d.fast?"#a78bfa":"var(--gold)"};font-weight:700;font-size:1rem">${d.day}</h3>
      </div>
      <div class="meal-grid">
        <div class="meal-cell"><div class="meal-lbl">فطور</div><div class="meal-val">${d.breakfast}</div></div>
        <div class="meal-cell"><div class="meal-lbl">غداء</div><div class="meal-val">${d.lunch}</div></div>
      </div>
    </div>`).join("");
}

function bindRecipes(){}

function switchRecipeView(v){
  recipeView=v;
  renderPage("recipes");
}
function switchRecipeType(t){
  recipeType=t;
  const types=[...new Set(RECIPES.map(r=>r.type))];
  document.getElementById("recipe-content").innerHTML=renderRecipesTab(types);
}

// ── Theme ──────────────────────────────────────────────────────────────────────
let isLight=false;
function toggleTheme(){
  isLight=!isLight;
  document.getElementById("app").classList.toggle("light-mode",isLight);
  document.body.style.background=isLight?"#f5f0e8":"#0f1a0f";
  document.getElementById("theme-icon").textContent=isLight?"🌙":"☀️";
  document.getElementById("theme-label").textContent=isLight?"داكن":"فاتح";
  document.getElementById("topbar").style.background=isLight?"#2d6a2d":"#1a4a1a";
}

// ── Boot ───────────────────────────────────────────────────────────────────────
buildNav();
renderPage("home");
</script>
</body>
</html>
